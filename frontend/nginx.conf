# frontend/nginx.conf

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip para performance
    gzip on;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        application/x-javascript text/xml application/xml;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # Headers de segurança
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Cache de assets estáticos (JS, CSS, imagens)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy reverso para o backend FastAPI
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeout para relatórios (podem demorar)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Tamanho máximo de upload (10MB)
        client_max_body_size 10M;
    }

    # Health check do nginx
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA — todas as rotas caem no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Bloqueia acesso a arquivos ocultos
    location ~ /\. {
        deny all;
        return 404;
    }
}