# docker-compose.yml

version: "3.9"

services:

  # ── PostgreSQL ─────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: salary_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-salary_db}
      POSTGRES_USER:     ${POSTGRES_USER:-salary_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-salary_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"           # Expõe para acesso externo (dev)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-salary_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - salary_network

  # ── Backend FastAPI ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salary_backend
    restart: unless-stopped
    environment:
      APP_ENV:                      ${APP_ENV:-development}
      SECRET_KEY:                   ${SECRET_KEY}
      DATABASE_URL:                 postgresql://${POSTGRES_USER:-salary_user}:${POSTGRES_PASSWORD:-salary_pass}@db:5432/${POSTGRES_DB:-salary_db}
      ACCESS_TOKEN_EXPIRE_MINUTES:  ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS:    ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      MAX_UPLOAD_SIZE_MB:           ${MAX_UPLOAD_SIZE_MB:-10}
      ALLOWED_ORIGINS:              ${ALLOWED_ORIGINS:-http://localhost:3000}
    volumes:
      - uploads_data:/app/uploads   # Persiste uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - salary_network

  # ── Frontend React + Nginx ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1      # Nginx faz proxy — URL relativa
    container_name: salary_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - salary_network

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  salary_network:
    driver: bridge